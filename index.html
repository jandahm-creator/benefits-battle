<!doctype html>
<html lang="de">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VB Benefits Battle</title>

<style>
body{
 font-family:Arial;
 margin:0;
 background:#f4f6f9;
 text-align:center;
 padding-bottom:140px;
}

.header{
 background:#0051A2;
 color:white;
 padding:15px;
 font-size:20px;
}

/* 🔥 BATTLE LAYOUT */
.battle-container{
 display:grid;
 grid-template-columns:1fr;
 gap:16px;
 padding:15px;
 align-items:center;
}

@media(min-width:700px){
 .battle-container{
   grid-template-columns:1fr 80px 1fr;
 }
}

.vs{
 font-size:22px;
 font-weight:bold;
 color:#666;
}

/* 🔥 CARD */
.card{
 background:white;
 border-radius:16px;
 cursor:pointer;
 box-shadow:0 6px 20px rgba(0,0,0,0.1);
 overflow:hidden;
 transition:all 0.2s ease;
}

@media(min-width:700px){
 .card:hover{
   transform:scale(1.04);
   box-shadow:0 10px 30px rgba(0,0,0,0.2);
 }
}

.card:active{
 transform:scale(0.97);
}

.card img{
 width:100%;
 height:220px;
 object-fit:cover;
}

.card h3{
 padding:10px;
 color:#0051A2;
}

/* QUIZ */
.quiz-box{
 padding:20px;
}

button{
 padding:12px;
 margin:6px;
 border:none;
 border-radius:10px;
 background:#F36F21;
 color:white;
 font-size:16px;
}

/* 🔥 PROGRESS BAR UNTEN */
.progress-container{
 position:fixed;
 bottom:0;
 left:0;
 width:100%;
 background:white;
 padding:10px;
 box-shadow:0 -3px 10px rgba(0,0,0,0.1);
}

.progress-text{
 font-weight:bold;
 margin-bottom:5px;
}

.progress-bar{
 width:90%;
 height:10px;
 background:#ddd;
 border-radius:10px;
 margin:0 auto;
 overflow:hidden;
}

.progress-fill{
 height:100%;
 width:0%;
 background:#0051A2;
 transition:width 0.4s ease;
}

.dots{
 margin-top:6px;
}

.dot{
 display:inline-block;
 width:10px;
 height:10px;
 margin:3px;
 border-radius:50%;
 background:#ccc;
}

.dot.active{
 background:#F36F21;
}

/* Animation */
.fade{
 animation:fade 0.4s;
}
@keyframes fade{
 from{opacity:0}
 to{opacity:1}
}
</style>
</head>

<body>

<div class="header">VB Benefits Battle</div>
<div id="game"></div>

<!-- Fortschritt -->
<div class="progress-container">
<div class="progress-text" id="progressText">Fortschritt: 0 / 10</div>
<div class="progress-bar">
<div class="progress-fill" id="progressFill"></div>
</div>
<div class="dots" id="dots"></div>
</div>

<script>

// ---------- STATE ----------
let battleCount = 0;
let streak = 0;

// ---------- BENEFITS ----------
const benefits = [
 {id:1,title:"Mobiles Arbeiten",img:"https://images.unsplash.com/photo-1522202176988-66273c2fd55f"},
 {id:2,title:"JobRad",img:" https://www.fahrrad-nerz.de/images/leasing/bikeleasing-impression.jpg"},
 {id:3,title:"Förderung von Weiterbildungen",img:"https://images.unsplash.com/photo-1519389950473-47ba0277781c"},
 {id:4,title:"Betriebliche Gesundheitsangebote",img:"https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b"},
{id:5,title:"Mitarbeiterkonditionen",img:" https://www.lfi-mv.de/export/sites/lfi/.galleries/karriere/money-2696229.jpg_483903577.jpg"},
{id:6,title:"Sonderurlaub zu besonderen Anlässen",img:" https://www.allianz.de/recht-und-eigentum/rechtsschutzversicherung/arbeitsrecht/sonderurlaub/_jcr_c…,
{id:7,title:"Flexible Arbeitszeitgestaltung",img:" https://www.gruender.de/wp-content/uploads/2023/10/Flexible-Arbeitszeiten-scaled.jpeg"},
{id:8,title:"EGYM Wellpass",img:" https://www.diakonie-meissen.de/wp-content/uploads/2024/09/WP_Portal_Keyvisual_20231121-2048x1229.j…,
{id:9,title:"Deutschlandticket",img:" https://bahnblogstelle.com/wp-content/uploads/2023/02/2023-02-deutschlandticket-49-euro-ticket-chip…,
{id:10,title:"Facharztvermittlung",img:" https://tse4.mm.bing.net/th/id/OIP.Zzm-lcfjNLZnzCG7wqGibwHaE8?rs=1&pid=ImgDetMain&o=7&rm=3"},
{id:11,title:"Gruppenunfallversicherung – beruflich und privat",img:" https://cdn.test.de/file/image/36/21/b95a90b5-7178-4d59-a533-0192762423df-web/5743272_private-unfal…,
{id:12,title:"Betriebliche Altersversorgung",img:" https://www.drklein-wowi.de/wp-content/uploads/2026/01/Grafik-fuer-NL-1440x810.jpg"},
{id:13,title:"Kostenloses Wasser",img:" https://www.bhs-tabletop.com/Website/5_Inspiration/Themen/Modern_Office/46376/image-thumb__46376__a…,
{id:14,title:"Hinterbliebenenversorgung",img:" https://kanzlei-herfurtner.de/Wordpress/wp-content/uploads/2024/12/Hinterbliebenenversorgung-1024x5…,
{id:15,title:"Beihilfen zu besonderen Anlässen",img:" https://i.pinimg.com/originals/74/fb/b4/74fbb4c4579c2cd2c89cac91c77e1c88.jpg"},
 {id:16,title:"Betriebsfest",img:"https://blog.eventinc.de/wp-content/uploads/2017/05/Sektempfang-min-iloveimg-compressed.jpg"}
];

// ---------- QUIZ ----------
const quiz = [
 {q:"Wie viele Mitarbeitende hat die Volksbank Westmünsterland?",a:["Ca. 500","Ca. 1.000","Ca. 1.500"],correct:1},
 {q:"Was ist ein Benefit?",a:["Zusatzleistung für Mitarbeitende","Grundgehalt","Arbeitszeitmodell"],correct:0},
 {q:"Welche Benefits bietet die Volksbank Westmünsterland?",a:["Nur Gehalt","Zusatzleistungen wie Bike-Leasing","Keine Zusatzangebote"],correct:1},
 {q:"Was fördert die Mitarbeiterzufriedenheit?",a:["Benefits und Entwicklungsmöglichkeiten","Mehr Kontrolle","Weniger Kommunikation"],correct:0},
 {q:"Welche Rolle spielt Employer Branding?",a:["Unwichtig","Stärkt Arbeitgeberattraktivität","Nur Marketing ohne Einfluss"],correct:1},
 {q:"Warum sind Benefits wichtig?",a:["Steigern Motivation und Bindung","Sind unwichtig","Kosten nur Geld"],correct:0},
 {q:"Was gehört NICHT zu Benefits?",a:["Gehalt","Bike-Leasing","Gesundheitsangebote"],correct:0},
 {q:"Was ist ein Ziel moderner Personalarbeit?",a:["Mitarbeiter binden und entwickeln","Nur Kosten sparen","Keine Veränderung"],correct:0},
 {q:"Was stärkt die Arbeitgebermarke?",a:["Transparenz und Benefits","Geheimhaltung","Weniger Kommunikation"],correct:0},
 {q:"Wie kann man Benefits sichtbar machen?",a:["Gar nicht","Durch Kommunikation und Tools","Nur intern verstecken"],correct:1}
];

// ---------- ELEMENTE ----------
const game = document.getElementById("game");
const progressText = document.getElementById("progressText");
const progressFill = document.getElementById("progressFill");
const dotsContainer = document.getElementById("dots");

// ---------- PROGRESS ----------
function updateProgress(){
 progressText.innerHTML = `Fortschritt: ${streak} / 10`;
 progressFill.style.width = (streak/10*100)+"%";

 dotsContainer.innerHTML="";
 for(let i=0;i<10;i++){
   let d=document.createElement("span");
   d.classList.add("dot");
   if(i<streak)d.classList.add("active");
   dotsContainer.appendChild(d);
 }
}

// ---------- GAME ----------
function randomPair(){
 let a=benefits[Math.floor(Math.random()*benefits.length)];
 let b;
 do{b=benefits[Math.floor(Math.random()*benefits.length)]}while(a.id===b.id);
 return [a,b];
}

function renderBattle(){
 let pair=randomPair();

 game.innerHTML=`
<div class="battle-container fade">

<div class="card" onclick="vote()">
<img src="${pair[0].img}">
<h3>${pair[0].title}</h3>
</div>

<div class="vs">VS</div>

<div class="card" onclick="vote()">
<img src="${pair[1].img}">
<h3>${pair[1].title}</h3>
</div>

</div>
 `;
}

function vote(){
 battleCount++;
 if(battleCount>=3){
   battleCount=0;
   renderQuiz();
 }else{
   renderBattle();
 }
}

function renderQuiz(){
 let q=quiz[Math.floor(Math.random()*quiz.length)];

 game.innerHTML=`
<div class="quiz-box fade">
<h2>${q.q}</h2>
     ${q.a.map((ans,i)=>`<button onclick="answer(${i},${q.correct})">${ans}</button>`).join("")}
</div>
 `;
}

function answer(i,correct){
 if(i===correct){
   streak++;
   updateProgress();

   game.innerHTML=`
<div class="fade">
<h2>Richtig! 🎉</h2>
<img src="https://media.giphy.com/media/111ebonMs90YLu/giphy.gif" width="150">
</div>
   `;

   if(streak>=10){
     win();
   }else{
     setTimeout(renderBattle,1200);
   }

 }else{
   game.innerHTML=`
<div class="fade">
<h2>Guter Versuch! 👍</h2>
<p>Du hattest ${streak} richtige Antworten.</p>
</div>
   `;
   streak=0;
   updateProgress();
   setTimeout(renderBattle,2000);
 }
}

function win(){
 let code="VB-"+Math.floor(1000+Math.random()*9000);

 game.innerHTML=`
<div class="fade">
<h1>🏆 Herzlichen Glückwunsch!</h1>
<p>Du hast gewonnen!</p>
<h2>${code}</h2>
<img src="https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif" width="200">
</div>
 `;
}

// ---------- START ----------
updateProgress();
renderBattle();

</script>

</body>
</html>
